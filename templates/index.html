<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Placement Analysis Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg sticky-top">
        <div class="container">
            <a class="navbar-brand" href="#">
                📊 PRODUCT PLACEMENT ANALYTICS
            </a>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container my-5">
        <div class="row mb-5 hero-section">
            <div class="col-lg-8">
                <h1 class="hero-title">Product Placement<br>Analysis Dashboard</h1>
                <p class="hero-subtitle">Explore curated analytics, visual insights, and data-driven product placement strategies.</p>
                <div class="stat-bar" id="stat-bar">
                    <div class="stat-item">
                        <div class="stat-number">Real-time</div>
                        <div class="stat-label">Analytics</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-number">Interactive</div>
                        <div class="stat-label">Visualizations</div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Dashboard Grid -->
        <div id="dashboard-grid" class="row g-4">
            <!-- Cards will be injected here by JavaScript -->
            <div class="col-12 text-center py-5" id="loader">
                <div class="spinner-border text-dark" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Full Screen Image Modal -->
    <div class="modal fade modal-full" id="imageModal" tabindex="-1" aria-hidden="true">
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-body">
                    <img src="" id="fullScreenImage" class="full-image" alt="Full Screen View">
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="mt-auto">
        <div class="container text-center">
            <p class="text-muted small">&copy; 2026 PRODUCT PLACEMENT ANALYSIS DASHBOARD</p>
        </div>
    </footer>

    <!-- JavaScript to load images -->
    <script>
        function openFullScreen(src) {
            const modal = new bootstrap.Modal(document.getElementById('imageModal'));
            document.getElementById('fullScreenImage').src = src;
            modal.show();
        }

        async function loadDashboards() {
            const grid = document.getElementById('dashboard-grid');
            const loader = document.getElementById('loader');

            try {
                const response = await fetch('/api/images');
                const images = await response.json();

                if (images.length === 0) {
                    grid.innerHTML = `
                        <div class="col-12 text-center py-5">
                            <p class="text-muted">No dashboard screenshots found.</p>
                        </div>
                    `;
                    return;
                }

                grid.innerHTML = '';

                images.forEach((img, index) => {
                    const col = document.createElement('div');
                    col.className = 'col-md-6 col-lg-4 card-animate';
                    col.style.animationDelay = `${index * 0.1}s`;
                    
                    const imgSrc = `/static/images/${img}`;
                    
                    col.innerHTML = `
                        <div class="card dashboard-card" onclick="openFullScreen('${imgSrc}')">
                            <div class="card-img-container">
                                <img src="${imgSrc}" class="card-img-top" alt="Dashboard ${index + 1}" onerror="this.src='https://picsum.photos/seed/${index}/1200/800'">
                            </div>
                            <div class="card-body">
                                <div class="card-meta">Product Placement Analysis</div>
                                <button class="btn-view">View ↗</button>
                            </div>
                        </div>
                    `;
                    grid.appendChild(col);
                });
            } catch (error) {
                console.error('Error loading images:', error);
                grid.innerHTML = '<div class="col-12 text-center text-danger">Error loading dashboard images.</div>';
            }
        }

        document.addEventListener('DOMContentLoaded', loadDashboards);
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
